<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team - TheGalaxyHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

<header>
  <div class="container">
    <h1>TheGalaxyHub</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="annunci.html">Annunci</a></li>
        <li><a href="comunicazioni.html">Comunicazioni</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="candidature.html">Candidature</a></li>
        <li><a href="unban.html">Richieste Unban</a></li>
        <li><a href="login.html">Admin</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="container">
  <h2>Team Staff</h2>
  <ul id="team-contents"></ul>
</section>

<footer>
  <div class="container">
    <p>&copy; 2026 TheGalaxyHub</p>
  </div>
</footer>

<script>
  function aggiornaDatiDallaStorage(key) {
    if (key === 'team') {
      const team = JSON.parse(localStorage.getItem('team')) || [];
      const teamList = document.getElementById('team-contents');
      teamList.innerHTML = '';
      if (team.length === 0) {
        teamList.textContent = 'Nessun membro del team disponibile.';
      } else {
        team.forEach(membro => {
          const li = document.createElement('li');
          li.textContent = `${membro.nome} - ${membro.ruolo}`;
          teamList.appendChild(li);
        });
      }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    aggiornaDatiDallaStorage('team');
  });

  window.addEventListener('storage', (event) => {
    if (event.key === 'team') {
      aggiornaDatiDallaStorage('team');
    }
  });
</script>

</body>
</html>
