<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

<header>
  <div class="container">
    <h1>TheGalaxyHub</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="annunci.html">Annunci</a></li>
        <li><a href="comunicazioni.html">Comunicazioni</a></li>

      </ul>
    </nav>

</header>

<section class="container">
  <h2>Comunicazioni</h2>
  <ul id="comunicazioni-contents"></ul>
</section>

<footer>
  <div class="container">
    <p>&copy; 2026 TheGalaxyHub</p>
  </div>
</footer>

<script>
  function aggiornaDatiDallaStorage(key) {
    if (key === 'comunicazioni') {
      const comunicazioni = JSON.parse(localStorage.getItem('comunicazioni')) || [];
      const comunicazioniList = document.getElementById('comunicazioni-contents');
      comunicazioniList.innerHTML = '';
      if (comunicazioni.length === 0) {
        comunicazioniList.textContent = 'Nessuna comunicazione disponibile.';
      } else {
        comunicazioni.forEach(comunicazione => {
          const li = document.createElement('li');
          li.textContent = comunicazione;
          comunicazioniList.appendChild(li);
        });
      }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    aggiornaDatiDallaStorage('comunicazioni');
  });

  window.addEventListener('storage', (event) => {
    if (event.key === 'comunicazioni') {
      aggiornaDatiDallaStorage('comunicazioni');
    }
  });
</script>

</body>
</html>
