<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Annunci - TheGalaxyHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f9fafb;
  color: #222;
  margin: 0;
  padding: 0;
}

header, footer {
  background-color: #005f99;
  color: #eef6fb;
  padding: 15px 30px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

header h1 {
  margin: 0;
  font-weight: 700;
  font-size: 1.8rem;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
  padding-left: 0;
  margin: 10px 0 0 0;
}

nav a {
  text-decoration: none;
  color: #eef6fb;
  font-weight: 600;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #ffdd59;
}

.container {
  max-width: 960px;
  margin: 30px auto;
  padding: 0 20px;
}

h2 {
  color: #004466;
  margin-bottom: 20px;
  font-weight: 700;
  border-bottom: 3px solid #005f99;
  padding-bottom: 5px;
}

ul#annunci-contents,
ul#comunicazioni-contents {
  list-style: none;
  padding: 0;
  margin: 0;
}

ul#annunci-contents li,
ul#comunicazioni-contents li {
  background-color: #ffffff;
  border-radius: 10px;
  padding: 18px 24px;
  margin-bottom: 15px;
  box-shadow: 0 3px 8px rgba(0, 95, 153, 0.15);
  transition: box-shadow 0.25s ease;
}

ul#annunci-contents li:hover,
ul#comunicazioni-contents li:hover {
  box-shadow: 0 6px 20px rgba(0, 95, 153, 0.25);
}

ul#annunci-contents li strong,
ul#comunicazioni-contents li strong {
  display: block;
  font-size: 1.2rem;
  color: #003355;
  margin-bottom: 8px;
}

footer p {
  text-align: center;
  font-size: 0.9rem;
  opacity: 0.75;
  margin: 0;
}
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>TheGalaxyHub</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="annunci.html">Annunci</a></li>
        <li><a href="comunicazioni.html">Comunicazioni</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="candidature.html">Candidature</a></li>
        <li><a href="unban.html">Richieste Unban</a></li>
        <li><a href="login.html">Admin</a></li>
      </ul>
    </nav>
  </div>
</header>

<section class="container">
  <h2>Annunci</h2>
  <ul id="annunci-contents"></ul>
</section>

<footer>
  <div class="container">
    <p>&copy; 2026 TheGalaxyHub</p>
  </div>
</footer>

<script>
  function aggiornaDatiDallaStorage(key) {
    if(key === 'annunci') {
      const annunci = JSON.parse(localStorage.getItem('annunci')) || [];
      const list = document.getElementById('annunci-contents');
      list.innerHTML = '';
      if(annunci.length===0){
        list.textContent = 'Nessun annuncio disponibile.';
      } else {
        annunci.forEach(a=>{
          const li = document.createElement('li');
          li.innerHTML = `<strong>${a.titolo}</strong>${a.descrizione}`;
          list.appendChild(li);
        });
      }
    }
  }

  document.addEventListener('DOMContentLoaded', ()=>{ aggiornaDatiDallaStorage('annunci'); });
  window.addEventListener('storage', (event)=>{ if(event.key==='annunci') aggiornaDatiDallaStorage('annunci'); });
</script>

</body>
</html>
